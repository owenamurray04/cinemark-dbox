name: Cinemark Brazil D-BOX live loop (self-sustaining)

# Independent self-chaining loop for BRAZIL — separate from the US loop so logs
# are isolated, a problem in one country can't stall the other, and each wakes only
# when its own showings need a read. Start it once: Actions -> this workflow ->
# Run workflow. Requires DISPATCH_PAT (shared with the US loop). CINEMARK_BR_PROXY
# is optional (Brazil uses a JSON API; add it only if direct runs get blocked).
on:
  workflow_dispatch:
  repository_dispatch:
    types: [cinemark-br-loop]
  schedule:
    - cron: '41 */2 * * *'   # backup restarter only (offset from the US loop's :23)

permissions:
  contents: write

concurrency:
  group: cinemark-br-scrape   # independent of the US loop's group
  cancel-in-progress: false

jobs:
  tick:
    runs-on: ubuntu-latest
    timeout-minutes: 120
    env:
      TZ: America/Sao_Paulo
      # Optional: only needed if Brazil starts blocking the runner IP.
      CINEMARK_BR_PROXY: ${{ secrets.CINEMARK_BR_PROXY }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: One Brazil check (discover-if-stale + measure), then decide the wait
        id: check
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

          commit_push () {  # $1 = commit message
            git add dashboard/cinemark_br_data.json schedule_cinemark_br dbox_theatres_cache_br.json 2>/dev/null || true
            if git diff --cached --quiet; then return 0; fi
            git commit -m "$1" >/dev/null
            for i in 1 2 3 4 5; do
              if git pull --rebase --autostash origin "${GITHUB_REF_NAME}" >/dev/null 2>&1 && git push >/dev/null 2>&1; then
                return 0
              fi
              sleep $((RANDOM % 5 + 2))
            done
            echo "  (push failed — will try again next run)"; return 0
          }

          DAY="$(date +%-m/%-d/%Y)"

          DOUT=$(python3 cinemark_br_scraper.py discover --date "$DAY" --max-age 720 || true)
          echo "$DOUT"
          printf '%s\n' "$DOUT" | grep -q 'skipping' || commit_push "br discover: $(date -u +%Y-%m-%dT%H:%MZ)"

          OUT=$(python3 cinemark_br_scraper.py measure --date "$DAY" --grace 20 || true)
          echo "$OUT"
          N=$(printf '%s\n' "$OUT" | sed -n 's/^MEASURED=//p' | tail -1)
          WAIT=$(printf '%s\n' "$OUT" | sed -n 's/^NEXT_WAIT_S=//p' | tail -1)

          if [ "${N:-0}" -gt 0 ]; then
            commit_push "br measure: $(date -u +%Y-%m-%dT%H:%MZ)"
          fi

          case "$WAIT" in (''|*[!0-9]*) WAIT=900 ;; esac
          [ "$WAIT" -lt 60 ] && WAIT=900
          [ "$WAIT" -gt 18000 ] && WAIT=18000
          echo "wait_s=$WAIT" >> "$GITHUB_OUTPUT"
          echo "Next BR check in ${WAIT}s (~$((WAIT/60)) min)."

      - name: Wait until the next check is due
        run: sleep ${{ steps.check.outputs.wait_s }}

      - name: Launch the next BR run, then exit
        if: always()
        run: |
          for i in 1 2 3 4 5; do
            code=$(curl -s -o /dev/null -w "%{http_code}" -X POST \
              -H "Authorization: Bearer ${{ secrets.DISPATCH_PAT }}" \
              -H "Accept: application/vnd.github+json" \
              "https://api.github.com/repos/${{ github.repository }}/dispatches" \
              -d '{"event_type":"cinemark-br-loop"}')
            if [ "$code" = "204" ]; then
              echo "Next BR run launched (HTTP 204)."; exit 0
            fi
            echo "arm attempt $i failed (HTTP $code) — retrying..."; sleep $((i*5))
          done
          echo "::warning::Could not launch next BR run. The 2-hourly backup schedule will restart it; or click Run workflow."
