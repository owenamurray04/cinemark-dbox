<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Motion Seat Index — Cinemark D-BOX demand</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Archivo:wght@600;700;800&family=Inter:wght@400;500;600&family=IBM+Plex+Mono:wght@500;600&display=swap" rel="stylesheet">
<style>
  :root{
    --ink:#0c0f14; --panel:#151b23; --panel2:#1b222c; --line:#27303c;
    --text:#e9ecf1; --muted:#8a94a4; --faint:#5b6573;
    --gold:#e5484d; --grey:#7f8b9c; --empty:#28303b; --up:#62c79e;
    --display:'Archivo',sans-serif; --body:'Inter',sans-serif; --mono:'IBM Plex Mono',monospace;
  }
  *{box-sizing:border-box}
  html,body{margin:0}
  body{background:radial-gradient(1100px 520px at 80% -10%, rgba(229,72,77,.12), transparent 60%), var(--ink);
    color:var(--text); font-family:var(--body); line-height:1.5; -webkit-font-smoothing:antialiased; padding:0 20px 60px}
  a{color:inherit}
  .wrap{max-width:1180px; margin:0 auto}
  .eyebrow{font-family:var(--display); font-weight:700; letter-spacing:.2em; text-transform:uppercase; font-size:11px; color:var(--muted)}

  header{display:flex; align-items:flex-end; justify-content:space-between; gap:16px; flex-wrap:wrap; padding:28px 0 18px}
  .brand h1{font-family:var(--display); font-weight:800; font-size:21px; margin:6px 0 0}
  .brand .sub{color:var(--muted); font-size:13px; margin-top:3px; max-width:52ch}
  .stamp{text-align:right; font-size:12px; color:var(--muted)}
  .stamp .live{display:inline-flex; align-items:center; gap:7px; color:var(--text); font-family:var(--mono); font-size:12px}
  .dot{width:7px; height:7px; border-radius:50%; background:var(--up); box-shadow:0 0 0 0 rgba(98,199,158,.6); animation:pulse 2.4s infinite}
  @keyframes pulse{0%{box-shadow:0 0 0 0 rgba(98,199,158,.5)}70%{box-shadow:0 0 0 7px rgba(98,199,158,0)}100%{box-shadow:0 0 0 0 rgba(98,199,158,0)}}

  .top{display:grid; grid-template-columns:1fr 340px; gap:26px; align-items:start; padding-top:8px}
  .card{background:var(--panel); border:1px solid var(--line); border-radius:16px; padding:22px 24px}
  .metric .big{font-family:var(--mono); font-weight:600; font-size:clamp(56px,9vw,96px); line-height:.9; letter-spacing:-.03em; margin:8px 0 0;
    background:linear-gradient(180deg,#ffb0b2,var(--gold)); -webkit-background-clip:text; background-clip:text; color:transparent}
  .metric .label{font-size:14px; color:var(--text); margin-top:8px}
  .substats{display:flex; gap:24px; margin-top:18px; flex-wrap:wrap}
  .substats .n{font-family:var(--mono); font-size:20px; color:var(--text)}
  .substats .k{font-size:10.5px; color:var(--muted); text-transform:uppercase; letter-spacing:.07em; margin-top:2px}

  .cmp{margin-top:18px; padding-top:18px; border-top:1px solid var(--line)}
  .bars{display:flex; flex-direction:column; gap:11px}
  .bar-row{display:grid; grid-template-columns:96px 1fr 52px; gap:12px; align-items:center}
  .bar-row .name{font-size:13px; color:var(--muted)}
  .track{height:11px; background:var(--panel2); border-radius:7px; overflow:hidden}
  .fill{height:100%; border-radius:7px; width:0; transition:width .7s cubic-bezier(.2,.7,.2,1)}
  .fill.gold{background:linear-gradient(90deg,#c43a3e,var(--gold))}
  .fill.grey{background:linear-gradient(90deg,#454f5d,var(--grey))}
  .bar-row .v{font-family:var(--mono); font-size:13px; text-align:right; color:var(--text)}
  .verdict{font-size:13px; color:var(--muted); margin-top:12px}
  .verdict b{color:var(--text)}

  .chartwrap{position:relative; margin-top:14px}
  .chart{width:100%; height:auto; display:block}
  .chart .grid-line{stroke:var(--line)}
  .chart .lndbox{fill:none; stroke:var(--gold); stroke-width:2.4; stroke-linejoin:round; stroke-linecap:round}
  .chart .lnreg{fill:none; stroke:var(--grey); stroke-width:2; stroke-linejoin:round; stroke-linecap:round; stroke-dasharray:1 0}
  .chart .ddbox{fill:var(--gold)} .chart .dreg{fill:var(--grey)}
  .chart .tick,.chart .glab{fill:var(--faint); font-family:var(--mono); font-size:10px}
  .cline{position:absolute; top:6px; bottom:24px; width:1px; background:rgba(229,72,77,.5); display:none; pointer-events:none; transform:translateX(-.5px)}
  .ctip{position:absolute; top:0; transform:translateX(-50%); background:#0c1118; border:1px solid var(--line); border-radius:8px;
    padding:7px 10px; font-size:11.5px; color:var(--text); white-space:nowrap; display:none; pointer-events:none; box-shadow:0 6px 18px rgba(0,0,0,.4); z-index:3}
  .ctip .ctd{font-family:var(--mono); color:var(--muted); margin-bottom:3px}
  .cdot{display:inline-block; width:8px; height:8px; border-radius:2px; margin-right:6px; vertical-align:-1px}
  .cdot.gold{background:var(--gold)} .cdot.grey{background:var(--grey)}
  .clegend{display:flex; gap:16px; font-size:11.5px; color:var(--muted); margin-top:8px}
  .clegend i{display:inline-block; width:14px; height:3px; border-radius:2px; margin-right:6px; vertical-align:3px}

  .rail{background:var(--panel); border:1px solid var(--line); border-radius:16px; padding:16px 6px 8px 18px}
  .rail .cap{display:flex; align-items:center; gap:8px; margin:0 12px 10px 0}
  .rail .cap .t{font-family:var(--display); font-weight:700; font-size:12px; letter-spacing:.05em; text-transform:uppercase; color:var(--muted)}
  .rail-list{max-height:560px; overflow-y:auto; padding-right:8px}
  .rail-list::-webkit-scrollbar{width:8px} .rail-list::-webkit-scrollbar-thumb{background:var(--line); border-radius:8px}
  .ride{display:block; text-decoration:none; padding:11px 10px; border-radius:10px; border:1px solid transparent; transition:background .15s,border-color .15s}
  .ride:hover{background:var(--panel2); border-color:var(--line)}
  .ride .r1{display:flex; justify-content:space-between; gap:8px; align-items:baseline}
  .ride .mv{font-size:13.5px; color:var(--text); font-weight:600; white-space:nowrap; overflow:hidden; text-overflow:ellipsis}
  .ride .tm{font-family:var(--mono); font-size:12px; color:var(--gold); white-space:nowrap}
  .ride .th{font-size:12px; color:var(--muted); margin:2px 0 7px; white-space:nowrap; overflow:hidden; text-overflow:ellipsis}
  .ride .r2{display:flex; align-items:center; gap:9px}
  .ride .mini{flex:1; height:7px; background:var(--panel2); border-radius:6px; overflow:hidden}
  .ride .mini i{display:block; height:100%; background:linear-gradient(90deg,#c43a3e,var(--gold))}
  .ride .pc{font-family:var(--mono); font-size:12px; color:var(--muted); min-width:64px; text-align:right}
  .ride .ago{font-size:10.5px; color:var(--faint); margin-top:4px}
  .ride .ext{font-size:10.5px; color:var(--gold); opacity:.8}

  .explorer{margin-top:34px; border-top:1px solid var(--line); padding-top:24px}
  .ex-head{display:flex; align-items:baseline; justify-content:space-between; gap:14px; flex-wrap:wrap; margin-bottom:14px}
  .sortbar{display:flex; gap:6px; flex-wrap:wrap}
  .sortbtn{appearance:none; background:var(--panel); border:1px solid var(--line); color:var(--muted); cursor:pointer;
    font-family:var(--body); font-size:12px; padding:6px 12px; border-radius:20px}
  .sortbtn:hover{color:var(--text)}
  .sortbtn.on{color:var(--ink); background:var(--gold); border-color:var(--gold); font-weight:600}
  .ex-list{display:flex; flex-direction:column}
  .ex-row{display:grid; grid-template-columns:1.4fr 1.3fr 84px 1fr 56px 1fr 46px; gap:12px; align-items:center;
    padding:10px 6px; border-top:1px solid rgba(39,48,60,.5); font-size:13px}
  .ex-row.h{border-top:0; color:var(--muted); font-family:var(--display); font-size:10.5px; letter-spacing:.06em; text-transform:uppercase; padding-bottom:8px}
  .ex-row .tcell{color:var(--text); white-space:nowrap; overflow:hidden; text-overflow:ellipsis}
  .ex-row .mcell{color:var(--muted); white-space:nowrap; overflow:hidden; text-overflow:ellipsis}
  .ex-row .when{font-family:var(--mono); font-size:11.5px; color:var(--faint)}
  .ex-bar{height:9px; background:var(--panel2); border-radius:6px; overflow:hidden}
  .ex-bar i{display:block; height:100%}
  .ex-bar i.gold{background:linear-gradient(90deg,#c43a3e,var(--gold))}
  .ex-bar i.grey{background:linear-gradient(90deg,#454f5d,var(--grey))}
  .ex-row .num{font-family:var(--mono); font-size:12.5px; text-align:right}
  .ex-row .num.gold{color:var(--gold)} .ex-row .num.grey{color:var(--grey)}
  .ex-row a.go{font-size:11px; color:var(--gold); text-decoration:none; text-align:right; opacity:.85}
  .ex-row a.go:hover{text-decoration:underline}

  .pager{display:flex; gap:6px; justify-content:center; flex-wrap:wrap; margin-top:20px}
  .pagebtn{appearance:none; background:var(--panel); border:1px solid var(--line); color:var(--muted); cursor:pointer;
    font-family:var(--mono); font-size:12.5px; min-width:34px; padding:7px 9px; border-radius:8px}
  .pagebtn:hover:not(:disabled){color:var(--text)}
  .pagebtn.on{background:var(--gold); color:var(--ink); border-color:var(--gold); font-weight:600}
  .pagebtn:disabled{opacity:.35; cursor:default}
  .pagegap{color:var(--faint); align-self:center; padding:0 2px}
  .ex-count{font-size:11.5px; color:var(--faint); text-align:center; margin-top:10px}
  .empty{padding:50px 0; text-align:center; color:var(--muted)}
  .empty.small{padding:26px 0; font-size:13px}
  .empty .big-e{font-family:var(--display); font-weight:700; color:var(--text); font-size:18px; margin-bottom:6px}
  footer{margin-top:30px; padding-top:22px; border-top:1px solid var(--line); color:var(--faint); font-size:12.5px}
  footer b{color:var(--muted)}

  @media (max-width:900px){
    .top{grid-template-columns:1fr}
    .rail-list{max-height:380px}
    .ex-row{grid-template-columns:1.4fr 1.2fr 70px 1fr 46px; }
    .ex-row .regcol,.ex-row .gocol{display:none}
    .stamp{text-align:left}
  }
  @media (prefers-reduced-motion:reduce){*{animation:none!important; transition:none!important}}
</style>
</head>
<body>
<div class="wrap">
  <header>
    <div class="brand">
      <div class="eyebrow">Cineplex + Cinemark · D-BOX / premium motion seats</div>
      <h1>Motion Seat Index</h1>
      <div class="sub">How full premium motion seats get by showtime across Cineplex and Cinemark — and how that compares to the rest of the house. Pick a chain above.</div>
    </div>
    <div class="stamp"><div class="live"><span class="dot"></span><span id="stamp">—</span></div>
      <div id="sources" style="margin-top:6px"></div></div>
  </header>
  <div class="sortbar" style="margin:0 0 18px; position:relative">
    <button class="sortbtn on" data-sel="all">All</button>
    <button class="sortbtn" data-sel="cineplex">Cineplex</button>
    <button class="sortbtn" data-sel="cinemark" id="cmkbtn">Cinemark ▾</button>
    <div id="cmkmenu" style="display:none; position:absolute; top:40px; left:128px; z-index:20; background:var(--panel); border:1px solid var(--line); border-radius:10px; padding:8px 12px; box-shadow:0 10px 28px rgba(0,0,0,.45)">
      <label style="display:flex;gap:9px;align-items:center;font-size:13px;color:var(--text);padding:5px 2px;white-space:nowrap;cursor:pointer"><input type="checkbox" data-cc="us" checked> United States</label>
      <label style="display:flex;gap:9px;align-items:center;font-size:13px;color:var(--text);padding:5px 2px;white-space:nowrap;cursor:pointer"><input type="checkbox" data-cc="br" checked> Brasil</label>
      <label style="display:flex;gap:9px;align-items:center;font-size:13px;color:var(--text);padding:5px 2px;white-space:nowrap;cursor:pointer"><input type="checkbox" data-cc="co" checked> Colombia</label>
    </div>
  </div>
  <div id="app"></div>
  <footer id="foot"></footer>
</div>

<script>
window.SAMPLE = {"updatedUtc":"2026-06-22T03:47:00+00:00","source":"Cinemark · D-BOX motion seats","showingsStore":{
 "2026-06-21|1111|301831":{"date":"2026-06-21","theatreId":1111,"theatre":"Cinemark The Woodlands and XD","movie":"F1: The Movie","showtimeId":301831,"start":"2026-06-21T22:40:00","startUtc":"2026-06-22T03:40:00+00:00","state":"TX","sold":21,"sellable":35,"regSold":120,"regSellable":232,"lastSeenUtc":"2026-06-22T03:45:00+00:00","cinemarkUrl":"#"},
 "2026-06-21|216|659905":{"date":"2026-06-21","theatreId":216,"theatre":"Cinemark Harlingen 16 and XD","movie":"Elio","showtimeId":659905,"start":"2026-06-21T21:00:00","startUtc":"2026-06-22T02:00:00+00:00","state":"TX","sold":12,"sellable":28,"regSold":60,"regSellable":210,"lastSeenUtc":"2026-06-22T02:05:00+00:00","cinemarkUrl":"#"},
 "2026-06-20|452|410022":{"date":"2026-06-20","theatreId":452,"theatre":"Cinemark Century Rio Plex 24 and XD","movie":"Elio","showtimeId":410022,"start":"2026-06-20T19:15:00","startUtc":"2026-06-21T01:15:00+00:00","state":"NM","sold":18,"sellable":30,"regSold":90,"regSellable":260,"lastSeenUtc":"2026-06-21T01:20:00+00:00","cinemarkUrl":"#"},
 "2026-06-21|770|512044":{"date":"2026-06-21","theatreId":770,"theatre":"Cinemark Howard Hughes Los Angeles and XD","movie":"F1: The Movie","showtimeId":512044,"start":"2026-06-21T22:10:00","startUtc":"2026-06-22T05:10:00+00:00","state":"CA","sold":9,"sellable":32,"regSold":40,"regSellable":250,"lastSeenUtc":"2026-06-22T04:50:00+00:00","cinemarkUrl":"#"}
},"upcoming":[
{"theatre":"Cinemark The Woodlands and XD","theatreId":1111,"movie":"F1: The Movie","start":"2026-06-22T22:40:00","startUtc":"2026-06-23T03:40:00+00:00","cinemarkUrl":"#","sold":14,"sellable":35,"lastSeenUtc":"2026-06-23T03:20:00+00:00"},
{"theatre":"Cinemark Harlingen 16 and XD","theatreId":216,"movie":"Elio","start":"2026-06-22T21:00:00","startUtc":"2026-06-23T02:00:00+00:00","cinemarkUrl":"#","sold":null,"sellable":null,"lastSeenUtc":null},
{"theatre":"Cinemark Howard Hughes Los Angeles and XD","theatreId":770,"movie":"F1: The Movie","start":"2026-06-22T22:10:00","startUtc":"2026-06-23T05:10:00+00:00","cinemarkUrl":"#","sold":7,"sellable":32,"lastSeenUtc":"2026-06-23T04:55:00+00:00"}
]};

const pct = x => Math.round((x||0)*100) + '%';
const CANON = {};
function canon(name){ if(!name) return name||'';
  let k=name.normalize('NFD').replace(/[̀-ͯ]/g,'').toLowerCase().replace(/['’:]/g,'').replace(/\s+/g,' ').trim();
  return CANON[k]||name; }
const dstr = ms => { const d=new Date(ms); return d.getFullYear()+'-'+String(d.getMonth()+1).padStart(2,'0')+'-'+String(d.getDate()).padStart(2,'0'); };
const fmtDay = s => { try{ return new Date(s+'T12:00').toLocaleString([], {month:'short',day:'numeric'}); }catch(e){ return s||''; } };
const fmtStamp = iso => { try{ return 'as of '+new Date(iso).toLocaleString([], {month:'short',day:'numeric',hour:'numeric',minute:'2-digit'}); }catch(e){ return 'as of —'; } };
function ago(iso){ try{ const s=(Date.now()-new Date(iso).getTime())/1000;
  if(s<90) return 'measured just now'; if(s<3600) return 'measured '+Math.round(s/60)+'m ago';
  if(s<86400) return 'measured '+Math.round(s/3600)+'h ago'; return 'measured '+Math.round(s/86400)+'d ago'; }catch(e){ return ''; } }
const NOW = Date.now();
// A showing flips from "upcoming" to "completed" this many ms after its start.
// Must match REALIZE_MIN in cinemark_scraper.py so the rail hand-off has no gap.
const REALIZE_MS = 15*60*1000;
const TZ = (()=>{ try{ return Intl.DateTimeFormat().resolvedOptions().timeZone; }catch(e){ return 'local'; } })();
function locParts(r){
  if(r.startUtc){ try{ const d=new Date(r.startUtc);
    return {date:d.toLocaleDateString([],{month:'short',day:'numeric'}),
            time:d.toLocaleTimeString([],{hour:'numeric',minute:'2-digit'})}; }catch(e){} }
  return {date:fmtDay(r.date), time:(r.start||'').slice(11,16)};
}

function enrich(r){
  const sellable=r.sellable||0, reg=r.regSellable||0;
  const startMs = r.startUtc ? Date.parse(r.startUtc) : null;
  return {...r, movie:canon(r.movie), startMs, loc:locParts(r),
    fill: sellable? r.sold/sellable : 0, regFill: reg? r.regSold/reg : 0,
    realized: startMs!=null ? (NOW > startMs + REALIZE_MS) : ((r.date||'') < dstr(NOW)),
    chain: r.chain || '',
    url: r.cinemarkUrl || r.cineplexUrl || (r.chain==='Cineplex' ? 'https://www.cineplex.com' : 'https://www.cinemark.com/theatres')};
}
const CHAIN_TAG = {'Cineplex':'CPX','Cinemark US':'US','Cinemark Brasil':'BR','Cinemark Colombia':'CO'};
function agg(recs){
  let s=0,se=0,rs=0,rse=0; const th=new Set();
  recs.forEach(r=>{ s+=r.sold||0; se+=r.sellable||0; rs+=r.regSold||0; rse+=r.regSellable||0; th.add(r.theatreId); });
  return {sold:s, sellable:se, fill:se? s/se:0, regSold:rs, regSellable:rse, regFill:rse? rs/rse:0, showings:recs.length, theatres:th.size};
}

/* ---- interactive 2-line trend ---- */
let CHART=null;
function chartSVG(byDay){
  if(!byDay || byDay.length<1) return '<div class="empty small">The trend builds as days of D-BOX showings complete.</div>';
  const W=700,H=200,pad={l:38,r:14,t:14,b:24}, n=byDay.length;
  const xs=i=> n===1 ? (pad.l+(W-pad.l-pad.r)/2) : pad.l+i*(W-pad.l-pad.r)/(n-1);
  const maxv=Math.max(0.05, ...byDay.map(d=>Math.max(d.dbox,d.reg)));
  const top=Math.min(1, maxv*1.28), ys=v=> pad.t+(1-v/top)*(H-pad.t-pad.b);
  const line=key=> byDay.map((d,i)=>(i?'L':'M')+xs(i).toFixed(1)+' '+ys(d[key]).toFixed(1)).join(' ');
  let grid=''; [0.25,0.5,0.75].forEach(g=>{ const y=ys(top*g);
    grid+=`<line class="grid-line" x1="${pad.l}" y1="${y}" x2="${W-pad.r}" y2="${y}"/><text class="glab" x="3" y="${y+3}">${(top*g*100).toFixed(0)}%</text>`; });
  const dots=(key,cls)=> byDay.map((d,i)=>`<circle class="${cls}" cx="${xs(i)}" cy="${ys(d[key])}" r="${n>20?1.8:2.6}"/>`).join('');
  CHART={days: byDay.map((d,i)=>({date:d.date, dbox:d.dbox, reg:d.reg, xf:xs(i)/W}))};
  const xl = n>1 ? `<text class="tick" x="${pad.l}" y="${H-6}">${fmtDay(byDay[0].date)}</text><text class="tick" x="${W-pad.r}" y="${H-6}" text-anchor="end">${fmtDay(byDay[n-1].date)}</text>` : `<text class="tick" x="${xs(0)}" y="${H-6}" text-anchor="middle">${fmtDay(byDay[0].date)}</text>`;
  return `<div class="chartwrap" id="chartwrap">
    <svg class="chart" viewBox="0 0 ${W} ${H}" role="img" aria-label="D-BOX vs regular sell-through by day">
      ${grid}
      <path class="lnreg" d="${line('reg')}"/><path class="lndbox" d="${line('dbox')}"/>
      ${dots('reg','dreg')}${dots('dbox','ddbox')}${xl}
    </svg>
    <div class="cline" id="cline"></div><div class="ctip" id="ctip"></div>
  </div>
  <div class="clegend"><span><i style="background:var(--gold)"></i>D-BOX</span><span><i style="background:var(--grey)"></i>Regular</span><span style="color:var(--faint)">hover for any day</span></div>`;
}
function setupChart(){
  const wrap=document.getElementById('chartwrap'); if(!wrap||!CHART) return;
  const tip=document.getElementById('ctip'), line=document.getElementById('cline');
  const move=e=>{ const r=wrap.getBoundingClientRect(); const x=( (e.touches?e.touches[0].clientX:e.clientX) - r.left)/r.width;
    let bi=0,bd=9; CHART.days.forEach((d,i)=>{ const dd=Math.abs(d.xf-x); if(dd<bd){bd=dd;bi=i;} });
    const d=CHART.days[bi], L=Math.max(7,Math.min(93,d.xf*100));
    line.style.left=(d.xf*100)+'%'; line.style.display='block';
    tip.style.left=L+'%'; tip.style.display='block';
    tip.innerHTML=`<div class="ctd">${fmtDay(d.date)}</div><div><span class="cdot gold"></span>D-BOX ${pct(d.dbox)}</div><div><span class="cdot grey"></span>Regular ${pct(d.reg)}</div>`;
  };
  wrap.addEventListener('mousemove',move); wrap.addEventListener('touchmove',move,{passive:true});
  const hide=()=>{tip.style.display='none'; line.style.display='none';};
  wrap.addEventListener('mouseleave',hide); wrap.addEventListener('touchend',hide);
}

/* ---- render ---- */
let RECS=[], UPCOMING=[], SORT='recent', PAGE=0;
const PAGE_SIZE=50;
function pagerHTML(pages){
  if(pages<=1) return '';
  let b=`<button class="pagebtn" data-page="${PAGE-1}" ${PAGE===0?'disabled':''}>‹</button>`;
  const show=[]; for(let i=0;i<pages;i++){ if(i===0||i===pages-1||Math.abs(i-PAGE)<=2) show.push(i); }
  let last=-1;
  show.forEach(i=>{ if(i-last>1) b+=`<span class="pagegap">…</span>`; b+=`<button class="pagebtn ${i===PAGE?'on':''}" data-page="${i}">${i+1}</button>`; last=i; });
  b+=`<button class="pagebtn" data-page="${PAGE+1}" ${PAGE===pages-1?'disabled':''}>›</button>`;
  return `<div class="pager">${b}</div>`;
}
function metricsCard(recs){
  const a=agg(recs);
  const days=new Set(recs.map(r=>r.date)).size;
  const ratio = a.regFill>0 ? a.fill/a.regFill : null;
  const verdict = ratio==null ? '' :
    (ratio>=1.05 ? `D-BOX seats ran <b>${ratio.toFixed(1)}× fuller</b> than the rest of the house — the premium is pulling people in.`
     : ratio<=0.95 ? `D-BOX seats ran <b>${(1/ratio).toFixed(1)}× emptier</b> than the rest of the house.`
     : `D-BOX and regular seats sold at about the same rate.`);
  return `<div class="card metric">
    <div class="eyebrow" style="color:var(--gold)">Realized D-BOX sell-through · all time</div>
    <div class="big">${pct(a.fill)}</div>
    <div class="label">of D-BOX seats sold across showings that have played</div>
    <div class="substats">
      <div><div class="n">${a.sold}/${a.sellable}</div><div class="k">seats sold</div></div>
      <div><div class="n">${a.showings}</div><div class="k">completed showings</div></div>
      <div><div class="n">${a.theatres}</div><div class="k">theatres</div></div>
      <div><div class="n">${days}</div><div class="k">day${days===1?'':'s'} tracked</div></div>
    </div>
    <div class="cmp">
      <div class="eyebrow" style="margin-bottom:12px">D-BOX vs the rest of the house</div>
      <div class="bars">
        <div class="bar-row"><div class="name">D-BOX seats</div><div class="track"><div class="fill gold" data-w="${(a.fill*100).toFixed(0)}"></div></div><div class="v">${pct(a.fill)}</div></div>
        <div class="bar-row"><div class="name">Regular seats</div><div class="track"><div class="fill grey" data-w="${(a.regFill*100).toFixed(0)}"></div></div><div class="v">${pct(a.regFill)}</div></div>
      </div>
      <div class="verdict">${verdict}</div>
    </div>
    <div style="margin-top:20px"><div class="eyebrow">Sell-through over time</div>${chartSVG(byDayLines())}</div>
  </div>`;
}
function byDayLines(){
  const fin=RECS.filter(r=>r.realized);
  const by={};
  fin.forEach(r=>{ const d=by[r.date]||(by[r.date]={s:0,se:0,rs:0,rse:0});
    d.s+=r.sold||0; d.se+=r.sellable||0; d.rs+=r.regSold||0; d.rse+=r.regSellable||0; });
  return Object.keys(by).sort().map(k=>({date:k, dbox: by[k].se? by[k].s/by[k].se:0, reg: by[k].rse? by[k].rs/by[k].rse:0}));
}
function railCard(up){
  const rows = up.length ? up.map(r=>{
    const measured = (r.sellable||0)>0;
    const fill = measured ? r.sold/r.sellable : 0;
    const meta = measured
      ? `<div class="r2"><span class="mini"><i style="width:${(fill*100).toFixed(0)}%"></i></span><span class="pc">${r.sold}/${r.sellable} · ${pct(fill)}</span></div>
         <div class="ago">${ago(r.lastSeenUtc)} · <span class="ext">tickets ↗</span></div>`
      : `<div class="ago">not measured yet · <span class="ext">tickets ↗</span></div>`;
    return `<a class="ride" href="${r.cinemarkUrl||r.url||'#'}" target="_blank" rel="noopener">
      <div class="r1"><span class="mv">${r.movie}</span><span class="tm">${railWhen(r)}</span></div>
      <div class="th">${r.theatre||''}</div>${meta}</a>`;
  }).join('') : '<div class="empty small">No upcoming D-BOX showings on the schedule right now — they appear here as the day fills in.</div>';
  return `<div class="rail"><div class="cap"><span class="dot"></span><span class="t">Upcoming · ${up.length}</span></div>
    <div class="rail-list">${rows}</div></div>`;
}
function railWhen(r){
  try{ const d=new Date(r.startUtc); const today=new Date().toDateString()===d.toDateString();
    const t=d.toLocaleTimeString([],{hour:'numeric',minute:'2-digit'});
    return (today?'':(d.toLocaleDateString([],{weekday:'short'})+' '))+t; }
  catch(e){ return (r.start||'').slice(11,16); }
}
const barCell=(v,cls)=>`<div class="ex-bar"><i class="${cls}" style="width:${(v*100).toFixed(0)}%"></i></div>`;
function explorer(){
  const fin=RECS.filter(r=>r.realized);
  const MULTI = new Set(fin.map(r=>r.chain)).size>1;
  const tag = r => (MULTI && r.chain) ? `<span style="color:var(--faint);font-weight:600;font-size:11px;letter-spacing:.03em">${CHAIN_TAG[r.chain]||''}</span> ` : '';
  const btn=(id,lbl)=>`<button class="sortbtn ${SORT===id?'on':''}" data-sort="${id}">${lbl}</button>`;
  const controls=`<div class="sortbar">${btn('fullest','Fullest')}${btn('recent','Most recent')}${btn('movie','By movie')}${btn('theatre','By theatre')}${btn('day','By day')}</div>`;
  const grouped = (SORT==='movie'||SORT==='theatre'||SORT==='day');
  let items, head, rowf;
  if(grouped){
    const keyf = SORT==='movie'? r=>r.movie : SORT==='theatre'? r=>(r.theatre||('Theatre '+r.theatreId)) : r=>r.date;
    const g={};
    fin.forEach(r=>{ const k=keyf(r)||'—'; const o=g[k]||(g[k]={label:k,s:0,se:0,rs:0,rse:0,n:0});
      o.s+=r.sold||0; o.se+=r.sellable||0; o.rs+=r.regSold||0; o.rse+=r.regSellable||0; o.n++; });
    items=Object.values(g).map(o=>({...o, fill:o.se?o.s/o.se:0, regFill:o.rse?o.rs/o.rse:0}))
      .sort(SORT==='day' ? (a,b)=>(b.label).localeCompare(a.label) : (a,b)=>b.fill-a.fill);
    head=`<div>${SORT==='movie'?'Movie':SORT==='theatre'?'Theatre':'Day'}</div><div>Showings</div><div></div><div>D-BOX fill</div><div class="num">D-BOX</div><div class="regcol">Rest of house</div><div class="num regcol">Reg.</div>`;
    rowf=o=>`<div class="ex-row"><div class="tcell">${SORT==='day'?fmtDay(o.label):o.label}</div><div class="mcell">${o.n} show${o.n>1?'s':''} · ${o.s}/${o.se}</div><div></div>${barCell(o.fill,'gold')}<div class="num gold">${pct(o.fill)}</div><div class="ex-bar regcol"><i class="grey" style="width:${(o.regFill*100).toFixed(0)}%"></i></div><div class="num grey regcol">${pct(o.regFill)}</div></div>`;
  } else {
    items=[...fin].sort(SORT==='recent'
      ? (a,b)=>(b.startMs||0)-(a.startMs||0)
      : (a,b)=> (b.fill-a.fill) || (b.startMs||0)-(a.startMs||0));
    head=`<div>Theatre</div><div>Title</div><div>When</div><div>D-BOX fill</div><div class="num">D-BOX</div><div class="regcol">Rest of house</div><div class="num regcol">Reg.</div>`;
    rowf=r=>`<div class="ex-row"><div class="tcell">${tag(r)}${r.theatre||('Theatre '+r.theatreId)}</div><div class="mcell">${r.movie}</div><div class="when">${r.loc.date}, ${r.loc.time}</div>${barCell(r.fill,'gold')}<div class="num gold">${pct(r.fill)}</div><div class="ex-bar regcol"><i class="grey" style="width:${(r.regFill*100).toFixed(0)}%"></i></div><div class="num grey regcol">${pct(r.regFill)}</div></div>`;
  }
  const total=items.length, pages=Math.max(1, Math.ceil(total/PAGE_SIZE));
  if(PAGE>=pages) PAGE=0;
  const slice=items.slice(PAGE*PAGE_SIZE, PAGE*PAGE_SIZE+PAGE_SIZE);
  const body = total ? slice.map(rowf).join('') : '<div class="empty small">No completed showings yet — they appear here once today\'s showtimes pass.</div>';
  const lo=total?PAGE*PAGE_SIZE+1:0, hi=Math.min(total,(PAGE+1)*PAGE_SIZE);
  const countlbl = total>PAGE_SIZE ? `<div class="ex-count">showing ${lo}–${hi} of ${total}</div>` : '';
  return `<div class="explorer">
    <div class="ex-head"><div class="eyebrow">Completed showings · ${total}</div>${controls}</div>
    <div class="ex-row h">${head}</div><div class="ex-list">${body}</div>
    ${pagerHTML(pages)}${countlbl}</div>`;
}

function paint(){
  const fin=RECS.filter(r=>r.realized);
  document.getElementById('app').innerHTML =
    `<div class="top">${metricsCard(fin)}${railCard(UPCOMING)}</div>${explorer()}`;
  requestAnimationFrame(()=>{ document.querySelectorAll('.fill,.mini i,.ex-bar i').forEach(f=>{ if(f.dataset.w!=null) f.style.width=f.dataset.w+'%'; }); });
  setupChart();
  document.querySelectorAll('.sortbtn').forEach(b=> b.addEventListener('click',()=>{ SORT=b.dataset.sort; PAGE=0; paint(); }));
  document.querySelectorAll('.pagebtn').forEach(b=> b.addEventListener('click',()=>{ if(b.disabled) return; PAGE=+b.dataset.page; paint(); const ex=document.querySelector('.explorer'); if(ex) ex.scrollIntoView({behavior:'smooth',block:'start'}); }));
}
/* ---- multi-source loader: Cineplex + Cinemark US / Brasil / Colombia ----
   Each scraper publishes its own data file to its own repo's raw CDN. This page
   pulls all of them live and merges whichever the top selector has active — it
   never touches a scraper or a loop. Loading from raw.githubusercontent means
   Pages never rebuilds on a data commit (Pages caps ~10 builds/hr). */
const CMK_RAW = 'https://raw.githubusercontent.com/owenamurray04/cinemark-dbox/main/dashboard/';
const CPX_RAW = 'https://raw.githubusercontent.com/owenamurray04/dbox-dashboard/main/dashboard/';
const SOURCES = {
  cineplex: {label:'Cineplex',           chain:'Cineplex',          url:CPX_RAW+'data.json'},
  us:       {label:'Cinemark · US',       chain:'Cinemark US',       url:CMK_RAW+'cinemark_data.json'},
  br:       {label:'Cinemark · Brasil',   chain:'Cinemark Brasil',   url:CMK_RAW+'cinemark_br_data.json'},
  co:       {label:'Cinemark · Colombia', chain:'Cinemark Colombia', url:CMK_RAW+'cinemark_co_data.json'},
};
const CMK_COUNTRIES = ['us','br','co'];
const DATA = {};   // source key -> parsed JSON (null if a file is missing/empty)
let SEL = (()=>{ try{ return localStorage.getItem('msi_sel')||'all'; }catch(e){ return 'all'; } })();
let CC  = (()=>{ try{ return Object.assign({us:true,br:true,co:true}, JSON.parse(localStorage.getItem('msi_cc')||'{}')); }catch(e){ return {us:true,br:true,co:true}; } })();
function persist(){ try{ localStorage.setItem('msi_sel',SEL); localStorage.setItem('msi_cc',JSON.stringify(CC)); }catch(e){} }

function activeKeys(){
  if(SEL==='cineplex') return ['cineplex'];
  if(SEL==='cinemark') return CMK_COUNTRIES.filter(c=>CC[c]);
  return ['cineplex', ...CMK_COUNTRIES];   // 'all'
}
function setSelButtons(){
  document.querySelectorAll('[data-sel]').forEach(b=> b.classList.toggle('on', b.dataset.sel===SEL));
  const menu=document.getElementById('cmkmenu'); if(menu) menu.style.display=(SEL==='cinemark')?'block':'none';
}
function applySelection(){
  const keys=activeKeys();
  const recs=[], up=[], stamps=[], labels=[];
  keys.forEach(k=>{
    const d=DATA[k]; if(!d) return;
    labels.push(SOURCES[k].label);
    if(d.updatedUtc) stamps.push(d.updatedUtc);
    Object.values(d.showingsStore||{}).forEach(r=>{ if((r.sellable||0)>0) recs.push(enrich({...r, chain:SOURCES[k].chain})); });
    (d.upcoming||[]).forEach(r=> up.push({...r, movie:canon(r.movie), chain:SOURCES[k].chain}));
  });
  RECS=recs; UPCOMING=up; PAGE=0;
  const newest=stamps.sort().slice(-1)[0]||null;
  document.getElementById('stamp').textContent=fmtStamp(newest);
  document.getElementById('sources').textContent=labels.length? labels.join('   ·   ') : 'No data selected';
  document.getElementById('foot').innerHTML=`<b>How to read this.</b> The headline is realized D-BOX sell-through across the chains you've selected — how full the motion seats got by the time each show played. The comparison and trend pit D-BOX against every other seat in the same auditorium. The right rail is D-BOX showings still to play (click through to the cinema's site). Below: every completed showing, sortable; the tag (CPX/US/BR/CO) shows which chain when more than one is in view. Showtimes are in your local time zone (${TZ}). Research only — not investment advice.`;
  paint();
}

document.querySelectorAll('[data-sel]').forEach(b=> b.addEventListener('click',()=>{
  SEL=b.dataset.sel; SORT='recent'; persist(); setSelButtons(); applySelection();
}));
document.querySelectorAll('[data-cc]').forEach(cb=> cb.addEventListener('change',()=>{
  CC[cb.dataset.cc]=cb.checked;
  if(SEL!=='cinemark') SEL='cinemark';
  persist(); setSelButtons(); applySelection();
}));

// Fetch every source once; re-selecting just re-merges what's cached (no refetch).
(function loadAll(){
  document.getElementById('sources').textContent='Loading…';
  Promise.all(Object.keys(SOURCES).map(k=>
    fetch(SOURCES[k].url+'?t='+Date.now(),{cache:'no-store'})
      .then(r=> r.ok? r.json() : null).catch(()=>null).then(j=>{ DATA[k]=j; })
  )).then(()=>{
    document.querySelectorAll('[data-cc]').forEach(cb=> cb.checked=!!CC[cb.dataset.cc]);
    setSelButtons();
    applySelection();
  });
})();
</script>
